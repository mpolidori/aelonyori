<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>aelonyori docs</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #5a5a5a;
      --line: #dddddd;
      --accent: #000000;
      --surface: #fafafa;
      --link: #1e4f8f;
      --link-visited: #5f4f8f;
      --code-bg: #f6f6f6;
      --maxw: 980px;
      --sidebar: 280px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(220px, var(--sidebar)) minmax(0, 1fr);
    }

    .nav {
      border-right: 1px solid var(--line);
      padding: 1rem;
      position: sticky;
      top: 0;
      align-self: start;
      max-height: 100vh;
      overflow: auto;
    }

    .nav h1 {
      margin: 0 0 0.75rem;
      font-size: 0.92rem;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      color: var(--muted);
    }

    .nav ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 0.25rem;
    }

    .nav a {
      text-decoration: none;
      font-size: 0.88rem;
      padding: 0.25rem 0.35rem;
      border: 1px solid transparent;
      display: block;
    }

    .nav a:link {
      color: var(--link);
    }

    .nav a:visited {
      color: var(--link-visited);
    }

    .nav a:hover,
    .nav a[aria-current="page"] {
      border-color: var(--line);
      color: var(--accent);
      background: var(--surface);
    }

    .nav a:hover,
    .nav a:focus-visible {
      font-weight: 700;
    }

    .nav a:focus-visible {
      outline: 2px solid var(--line);
      outline-offset: 2px;
    }

    main {
      min-width: 0;
      padding: 1rem;
    }

    .doc {
      margin: 0 auto;
      max-width: var(--maxw);
      overflow-wrap: anywhere;
    }

    .doc h1,
    .doc h2,
    .doc h3,
    .doc h4 {
      line-height: 1.2;
      margin: 1.1em 0 0.55em;
    }

    .doc p,
    .doc ul,
    .doc ol,
    .doc table,
    .doc pre,
    .doc blockquote {
      margin: 0.7rem 0;
    }

    .doc ul,
    .doc ol {
      padding-left: 1.25rem;
    }

    .doc code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.08rem 0.22rem;
    }

    .doc pre {
      background: var(--code-bg);
      border: 1px solid var(--line);
      padding: 0.6rem;
      overflow: auto;
    }

    .doc pre code {
      background: transparent;
      padding: 0;
    }

    .doc blockquote {
      border-left: 3px solid var(--line);
      color: var(--muted);
      padding-left: 0.75rem;
    }

    .doc table {
      border-collapse: collapse;
      width: 100%;
      max-width: 100%;
      display: block;
      overflow: auto;
    }

    .doc a:link {
      color: var(--link);
      text-decoration-color: color-mix(in srgb, var(--link) 70%, transparent);
      text-underline-offset: 0.12em;
      text-decoration-thickness: 0.09em;
    }

    .doc a:visited {
      color: var(--link-visited);
      text-decoration-color: color-mix(in srgb, var(--link-visited) 70%, transparent);
    }

    .doc a:hover,
    .doc a:focus-visible {
      color: var(--accent);
      text-decoration-color: currentColor;
      font-weight: 700;
    }

    .doc th,
    .doc td {
      border: 1px solid var(--line);
      text-align: left;
      padding: 0.38rem 0.45rem;
      vertical-align: top;
      white-space: nowrap;
    }

    .error {
      color: var(--fg);
      border: 1px solid var(--line);
      background: var(--surface);
      padding: 0.65rem;
      font-size: 0.9rem;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .nav {
        position: static;
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="nav" aria-label="docs navigation">
      <h1>documentation</h1>
      <ul id="docNav"></ul>
    </nav>
    <main>
      <article id="doc" class="doc" aria-live="polite"></article>
    </main>
  </div>

  <script>
    (function () {
      const docs = [
        { file: "README.md", label: "overview" },
        { file: "user/user-guide.md", label: "user guide" },
        { file: "user/ui-controls-reference.md", label: "ui controls" },
        { file: "user/sampler-guide.md", label: "sampler guide" },
        { file: "user/video-synth-guide.md", label: "video synth guide" },
        { file: "technical/architecture-overview.md", label: "architecture" },
        { file: "technical/code-map.md", label: "code map" },
        { file: "technical/config-json-reference.md", label: "config.json" },
        { file: "technical/defaults-json-reference.md", label: "defaults.json" },
        { file: "technical/synthesis.md", label: "synthesis" },
        { file: "technical/video-synth.md", label: "video synth technical" }
      ];

      const navEl = document.getElementById("docNav");
      const docEl = document.getElementById("doc");
      const byFile = new Map(docs.map((entry) => [entry.file, entry]));
      const url = new URL(window.location.href);
      const activeThemeA = normalizeHexColorParam(url.searchParams.get("themeA"));
      const activeThemeB = normalizeHexColorParam(url.searchParams.get("themeB"));

      if (activeThemeA && activeThemeB) {
        applyDocsTheme(activeThemeA, activeThemeB);
      }

      function normalizeHexColorParam(value) {
        const raw = String(value || "").trim();
        const short = raw.match(/^#?([0-9a-fA-F]{3})$/);
        if (short) {
          const v = short[1];
          return `#${v[0]}${v[0]}${v[1]}${v[1]}${v[2]}${v[2]}`.toLowerCase();
        }
        const long = raw.match(/^#?([0-9a-fA-F]{6})$/);
        if (long) {
          return `#${long[1]}`.toLowerCase();
        }
        return null;
      }

      function parseHex(hex) {
        const m = String(hex || "").match(/^#([0-9a-f]{6})$/i);
        if (!m) return null;
        const value = m[1];
        return {
          r: Number.parseInt(value.slice(0, 2), 16),
          g: Number.parseInt(value.slice(2, 4), 16),
          b: Number.parseInt(value.slice(4, 6), 16),
        };
      }

      function mixRgb(a, b, t) {
        const clamped = Math.max(0, Math.min(1, Number.isFinite(t) ? t : 0));
        return {
          r: Math.round(a.r + (b.r - a.r) * clamped),
          g: Math.round(a.g + (b.g - a.g) * clamped),
          b: Math.round(a.b + (b.b - a.b) * clamped),
        };
      }

      function rgbToCss(rgb) {
        return `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
      }

      function applyDocsTheme(themeA, themeB) {
        const bg = parseHex(themeA);
        const fg = parseHex(themeB);
        if (!bg || !fg) return;
        const root = document.documentElement;
        root.style.setProperty("--bg", themeA);
        root.style.setProperty("--fg", themeB);
        root.style.setProperty("--accent", themeB);
        root.style.setProperty("--muted", rgbToCss(mixRgb(bg, fg, 0.62)));
        root.style.setProperty("--line", rgbToCss(mixRgb(bg, fg, 0.22)));
        root.style.setProperty("--surface", rgbToCss(mixRgb(bg, fg, 0.08)));
        root.style.setProperty("--code-bg", rgbToCss(mixRgb(bg, fg, 0.1)));
        root.style.setProperty("--link", rgbToCss(mixRgb(bg, fg, 0.86)));
        root.style.setProperty("--link-visited", rgbToCss(mixRgb(bg, fg, 0.68)));
      }

      function buildDocHref(file) {
        const next = new URL(window.location.pathname, window.location.origin);
        next.searchParams.set("page", file);
        if (activeThemeA && activeThemeB) {
          next.searchParams.set("themeA", activeThemeA);
          next.searchParams.set("themeB", activeThemeB);
        }
        return next.pathname + next.search;
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function escapeAttr(text) {
        return escapeHtml(text).replace(/\"/g, "&quot;");
      }

      function resolveDocHref(href, currentFile) {
        const raw = String(href || "").trim();
        if (!raw) return "#";
        if (/^(https?:|mailto:|#)/i.test(raw)) return raw;

        const baseDir = String(currentFile || "README.md")
          .split("/")
          .slice(0, -1)
          .join("/");

        const joined = raw.startsWith("/")
          ? raw.replace(/^\/+/, "")
          : (baseDir ? `${baseDir}/${raw}` : raw);

        const parts = [];
        for (const part of joined.split("/")) {
          if (!part || part === ".") continue;
          if (part === "..") {
            if (parts.length) parts.pop();
            continue;
          }
          parts.push(part);
        }
        const normalized = parts.join("/");

        if (/\.md$/i.test(normalized) && byFile.has(normalized)) {
          return buildDocHref(normalized);
        }
        return raw;
      }

      function parseInline(text, currentFile) {
        let out = escapeHtml(text);
        out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        out = out.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        out = out.replace(/`([^`]+)`/g, "<code>$1</code>");
        out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_m, label, href) {
          const safeHref = escapeAttr(resolveDocHref(href, currentFile));
          return '<a href="' + safeHref + '">' + label + '</a>';
        });
        return out;
      }

      function renderMarkdown(md, currentFile) {
        const lines = String(md || "").replace(/\r\n?/g, "\n").split("\n");
        let i = 0;
        let html = "";

        function parseTable(start) {
          let row = lines[start] || "";
          if (!row.includes("|")) return null;
          const sep = lines[start + 1] || "";
          if (!/^\s*\|?[\s:-]+\|[\s|:-]*$/.test(sep)) return null;

          const parseRow = (line) => line
            .trim()
            .replace(/^\|/, "")
            .replace(/\|$/, "")
            .split("|")
            .map((part) => parseInline(part.trim(), currentFile));

          const head = parseRow(row);
          const body = [];
          let idx = start + 2;
          while (idx < lines.length && /\|/.test(lines[idx])) {
            body.push(parseRow(lines[idx]));
            idx += 1;
          }

          let t = "<table><thead><tr>";
          for (const cell of head) t += "<th>" + cell + "</th>";
          t += "</tr></thead><tbody>";
          for (const r of body) {
            t += "<tr>";
            for (const cell of r) t += "<td>" + cell + "</td>";
            t += "</tr>";
          }
          t += "</tbody></table>";
          return { html: t, next: idx };
        }

        while (i < lines.length) {
          const line = lines[i];

          if (!line.trim()) {
            i += 1;
            continue;
          }

          const table = parseTable(i);
          if (table) {
            html += table.html;
            i = table.next;
            continue;
          }

          const codeFence = line.match(/^```/);
          if (codeFence) {
            const lang = line.slice(3).trim();
            i += 1;
            const block = [];
            while (i < lines.length && !/^```/.test(lines[i])) {
              block.push(lines[i]);
              i += 1;
            }
            if (i < lines.length) i += 1;
            html += '<pre><code' + (lang ? ' class="language-' + escapeAttr(lang) + '"' : "") + '>'
              + escapeHtml(block.join("\n")) + "</code></pre>";
            continue;
          }

          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            html += "<h" + level + ">" + parseInline(heading[2].trim(), currentFile) + "</h" + level + ">";
            i += 1;
            continue;
          }

          const quote = line.match(/^>\s?(.*)$/);
          if (quote) {
            const q = [];
            while (i < lines.length) {
              const qLine = lines[i].match(/^>\s?(.*)$/);
              if (!qLine) break;
              q.push(parseInline(qLine[1], currentFile));
              i += 1;
            }
            html += "<blockquote>" + q.join("<br />") + "</blockquote>";
            continue;
          }

          const ul = line.match(/^\s*[-*]\s+(.+)$/);
          if (ul) {
            const items = [];
            while (i < lines.length) {
              const m = lines[i].match(/^\s*[-*]\s+(.+)$/);
              if (!m) break;
              items.push("<li>" + parseInline(m[1].trim(), currentFile) + "</li>");
              i += 1;
            }
            html += "<ul>" + items.join("") + "</ul>";
            continue;
          }

          const ol = line.match(/^\s*\d+\.\s+(.+)$/);
          if (ol) {
            const items = [];
            while (i < lines.length) {
              const m = lines[i].match(/^\s*\d+\.\s+(.+)$/);
              if (!m) break;
              items.push("<li>" + parseInline(m[1].trim(), currentFile) + "</li>");
              i += 1;
            }
            html += "<ol>" + items.join("") + "</ol>";
            continue;
          }

          const para = [];
          while (i < lines.length && lines[i].trim()) {
            if (/^(#{1,6})\s+/.test(lines[i])) break;
            if (/^```/.test(lines[i])) break;
            if (/^\s*[-*]\s+/.test(lines[i])) break;
            if (/^\s*\d+\.\s+/.test(lines[i])) break;
            if (/^>\s?/.test(lines[i])) break;
            para.push(parseInline(lines[i].trim(), currentFile));
            i += 1;
          }
          if (para.length) html += "<p>" + para.join(" ") + "</p>";
        }

        return html;
      }

      function normalizePageParam(raw) {
        const value = String(raw || "").trim().replace(/^\/+/, "");
        if (!value) return "README.md";
        if (!/^[A-Za-z0-9._\/-]+$/.test(value)) return "README.md";
        if (!/\.md$/i.test(value)) return "README.md";
        if (value.includes("..")) return "README.md";
        return byFile.has(value) ? value : "README.md";
      }

      function makeNav(currentFile) {
        navEl.innerHTML = "";
        for (const entry of docs) {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = buildDocHref(entry.file);
          a.textContent = entry.label;
          if (entry.file === currentFile) a.setAttribute("aria-current", "page");
          li.appendChild(a);
          navEl.appendChild(li);
        }
      }

      async function loadDoc(file) {
        makeNav(file);
        try {
          const res = await fetch(file, { cache: "no-cache" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const md = await res.text();
          docEl.innerHTML = renderMarkdown(md, file);
          document.title = "aelonyori docs - " + (byFile.get(file)?.label || file);
        } catch (err) {
          docEl.innerHTML = '<div class="error">Failed to load documentation page: ' + escapeHtml(file)
            + '<br />' + escapeHtml(String(err && err.message ? err.message : err)) + "</div>";
        }
      }

      const page = normalizePageParam(url.searchParams.get("page"));
      loadDoc(page);
    })();
  </script>
</body>
</html>
